services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartplan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartplan"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/smartplan
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
